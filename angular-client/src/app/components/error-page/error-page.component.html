<div class="error-container">
  <div class="error-card">
    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </div>
    
    <h1 class="error-code">{{ errorCode }}</h1>
    <h2 class="error-title">{{ errorTitle }}</h2>
    <p class="error-message">{{ errorMessage }}</p>
    <p class="error-detail">{{ errorDetail }}</p>

    <div class="error-meta">
      <span class="timestamp">Reference Time: {{ timestamp | date:'medium' }}</span>
    </div>

    <div class="error-actions">
      <button (click)="retry()" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Go Back
      </button>
      <button (click)="goHome()" class="btn btn-primary">
        Return to Dashboard
      </button>
    </div>

    <div class="error-footer">
      <p>If you continue to experience issues, please contact our support team with the error code: <strong>{{ errorCode }}</strong></p>
    </div>
  </div>
</div>
