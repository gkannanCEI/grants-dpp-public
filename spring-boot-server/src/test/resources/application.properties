# ============================================================
# TEST-ONLY DataSource — H2 in-memory, no live DB required
# Overrides all ${ENV_VAR} references from main application.properties
# ============================================================

# H2 in-memory datasource (replaces PostgreSQL for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — use H2 dialect, recreate schema each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Suppress dialect auto-detection warnings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# App secret placeholder (satisfies @Value injection in tests)
app.secret=test-secret-key-for-unit-tests-only

# Disable banner noise in test output
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.com.bezkoder=INFO
