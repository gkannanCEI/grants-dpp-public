# ══════════════════════════════════════════════════════════════════════════════
# DataSource — PostgreSQL
# ══════════════════════════════════════════════════════════════════════════════
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/grants-dpp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ══════════════════════════════════════════════════════════════════════════════
# HikariCP Connection Pool
# Prewarms 5 connections at startup — eliminates the cold-start 30-60s delay
# that occurs when the first request has to create a TCP connection from scratch.
# ══════════════════════════════════════════════════════════════════════════════
spring.datasource.hikari.pool-name=GrantsDPP-HikariPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=10000

# ══════════════════════════════════════════════════════════════════════════════
# JPA / Hibernate
# ══════════════════════════════════════════════════════════════════════════════
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# ── Batch INSERT/UPDATE (improves bulk write throughput) ───────────────────
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# ══════════════════════════════════════════════════════════════════════════════
# Spring Cache — Caffeine (in-process, no external cache server required)
# Caches are defined per-cache-name with individual TTL and max-size policies.
# This replaces the JCache/Ehcache second-level cache that required a
# separate hibernate-jcache JAR on the classpath.
# ══════════════════════════════════════════════════════════════════════════════
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# ══════════════════════════════════════════════════════════════════════════════
# Spring MVC / Jackson
# ══════════════════════════════════════════════════════════════════════════════
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ══════════════════════════════════════════════════════════════════════════════
# Server compression — reduces response payload size over the wire
# ══════════════════════════════════════════════════════════════════════════════
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ══════════════════════════════════════════════════════════════════════════════
# App Configuration
# ══════════════════════════════════════════════════════════════════════════════
app.secret=${APP_SECRET:defaultSecretKey}
